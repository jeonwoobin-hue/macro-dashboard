name: Update stock sentiment data

on:
  schedule:
    # 매일 09:00 KST (=00:00 UTC). 기존 감성데이터 갱신(08:00 KST)과 겹치지 않게 1시간 띄웠다.
    - cron: "0 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements-stock.txt

      - name: Run stock sentiment pipeline
        run: python run_stock_pipeline.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/latest_run.json data/stock_data.db
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily stock sentiment data refresh"
            git push
          fi
