name: Update sentiment data

on:
  schedule:
    # 매일 08:00 KST (=전날 23:00 UTC). sentiment_scraper.py는 "어제" 09:00~익일 06:00 KST
    # 구간을 스크랩하므로, 06:00 KST 이후 충분히 시간을 두고 실행한다.
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # wordcloud/matplotlib은 Streamlit Cloud 배포 런타임에서 segfault를 일으켜
          # requirements.txt에서 제거했다(커밋 8d020e3). 워드클라우드 PNG 생성은
          # 이 CI 환경에서만 하고, 결과물(PNG)만 커밋해 배포 서버는 이 패키지들을
          # 아예 설치하지 않는다.
          pip install wordcloud==1.9.6 matplotlib==3.11.0

      - name: Scrape sentiment data
        run: python sentiment_scraper.py

      - name: Generate wordcloud images
        run: python wordcloud_gen.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment_data.json wordclouds/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily sentiment data refresh"
            git push
          fi
