name: Update sentiment data

on:
  schedule:
    # 매일 08:00 KST (=전날 23:00 UTC). sentiment_scraper.py는 "어제" 09:00~익일 06:00 KST
    # 구간을 스크랩하므로, 06:00 KST 이후 충분히 시간을 두고 실행한다.
    - cron: "0 23 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # wordcloud/matplotlib은 Streamlit Cloud 배포 런타임에서 segfault를 일으켜
          # requirements.txt에서 제거했다(커밋 8d020e3). 워드클라우드 PNG 생성은
          # 이 CI 환경에서만 하고, 결과물(PNG)만 커밋해 배포 서버는 이 패키지들을
          # 아예 설치하지 않는다.
          pip install wordcloud==1.9.6 matplotlib==3.11.0

      - name: Scrape sentiment data
        run: python sentiment_scraper.py

      - name: Generate wordcloud images
        run: python wordcloud_gen.py

      - name: Generate AI 해석 cache (지표가 새로 발표된 경우에만 Gemini 호출)
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python generate_ai_analysis.py
        # Gemini 무료 티어 429 등으로 실패해도 감성데이터 커밋(더 중요한 일간 갱신)까지
        # 막지는 않는다. 실패하면 다음 실행 때 재시도된다.
        continue-on-error: true

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sentiment_data.json sentiment_history.csv wordclouds/ ai_analysis_cache.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily sentiment data refresh"
            git push
          fi
